<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0F1E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ReplyLI — Respuestas LinkedIn con IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0A0F1E;
  --surface:  #111827;
  --surface2: #1A2438;
  --border:   #1E2D45;
  --blue:     #0077B5;
  --blue-dim: rgba(0,119,181,0.15);
  --teal:     #00C9A7;
  --teal-dim: rgba(0,201,167,0.12);
  --text:     #E8EDF5;
  --muted:    #5A7090;
  --danger:   #FF4757;
  --warn:     #FFA502;
  --success:  #00C9A7;
  --radius:   14px;
  --font-h:   'Syne', sans-serif;
  --font-b:   'DM Sans', sans-serif;
}

html, body { height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-b);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

/* ── HEADER ── */
.header {
  padding: 20px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text {
  font-family: var(--font-h);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 0.5px;
}
.logo-sub {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── MAIN ── */
.main {
  padding: 20px;
  max-width: 600px;
  margin: 0 auto;
}

/* ── CARD ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.field-label {
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  display: block;
}

textarea, input[type="url"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-family: var(--font-b);
  font-size: 14px;
  outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
textarea { resize: none; }
textarea:focus, input[type="url"]:focus { border-color: var(--blue); }
textarea::placeholder, input::placeholder { color: var(--muted); }

.char-count {
  text-align: right;
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
}

/* ── URL ROW ── */
.url-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.url-row input { flex: 1; }
.url-open-btn {
  padding: 11px 14px;
  background: var(--blue-dim);
  border: 1px solid rgba(0,119,181,0.3);
  border-radius: 10px;
  color: #4DA8D8;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font-b);
  transition: all .15s;
  flex-shrink: 0;
}
.url-open-btn:hover { background: rgba(0,119,181,0.25); }

/* ── TONOS ── */
.tone-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.tone-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 10px;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.tone-btn:active { transform: scale(0.97); }
.tone-icon { font-size: 20px; margin-bottom: 4px; }
.tone-name { font-family: var(--font-h); font-size: 13px; font-weight: 700; color: var(--muted); }
.tone-desc { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.3; }

.tone-btn.selected { border-color: var(--blue); background: var(--blue-dim); }
.tone-btn.selected .tone-name { color: #4DA8D8; }
.tone-btn.selected .tone-desc { color: rgba(77,168,216,0.7); }

/* ── GENERATE BTN ── */
.generate-btn {
  width: 100%;
  padding: 15px;
  background: var(--blue);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-family: var(--font-h);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 20px;
  transition: all .2s;
  -webkit-tap-highlight-color: transparent;
}
.generate-btn:hover { background: #006097; }
.generate-btn:active { transform: scale(0.98); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── LOADING ── */
.loading {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; }
.dot {
  width: 8px; height: 8px;
  background: var(--blue);
  border-radius: 50%;
  animation: pulse 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

/* ── RESULT CARDS ── */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  animation: slideUp .3s ease both;
}
@keyframes slideUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.result-card:nth-child(2) { animation-delay: .06s; }
.result-card:nth-child(3) { animation-delay: .12s; }
.result-card:nth-child(4) { animation-delay: .18s; }

.result-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.tone-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--font-h);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-formal     { background: rgba(77,168,216,0.15); color: #4DA8D8; border: 1px solid rgba(77,168,216,0.25); }
.badge-casual     { background: rgba(0,201,167,0.12); color: var(--teal); border: 1px solid rgba(0,201,167,0.2); }
.badge-empatico   { background: rgba(255,165,2,0.12); color: var(--warn); border: 1px solid rgba(255,165,2,0.2); }
.badge-estrategico{ background: rgba(255,71,87,0.1); color: #FF6B7A; border: 1px solid rgba(255,71,87,0.2); }

.result-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  white-space: pre-wrap;
  margin-bottom: 14px;
}

.result-actions { display: flex; gap: 8px; flex-wrap: wrap; }

.btn-action {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid;
  transition: all .15s;
  font-family: var(--font-b);
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-copy { background: var(--surface2); border-color: var(--border); color: var(--muted); }
.btn-copy:hover, .btn-copy:active { border-color: var(--teal); color: var(--teal); }
.btn-copy.copied { background: var(--teal-dim); border-color: rgba(0,201,167,0.3); color: var(--teal); }
.btn-li { background: var(--blue-dim); border-color: rgba(0,119,181,0.3); color: #4DA8D8; }
.btn-li:hover { background: rgba(0,119,181,0.25); }

/* ── ERROR ── */
.error-box {
  background: rgba(255,71,87,0.1);
  border: 1px solid rgba(255,71,87,0.25);
  border-radius: var(--radius);
  padding: 14px 16px;
  color: var(--danger);
  font-size: 13px;
  margin-bottom: 12px;
}

/* ── SECTION TITLE ── */
.section-title {
  font-family: var(--font-h);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 10px;
  margin-top: 4px;
}

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 4px 0 16px; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

@media (min-width: 600px) {
  .tone-grid { grid-template-columns: repeat(4, 1fr); }
  .header { padding: 24px 24px 0; }
  .main { padding: 24px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">in</div>
    <div>
      <div class="logo-text">ReplyLI</div>
      <div class="logo-sub">IA para LinkedIn</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- URL del post -->
  <div class="card">
    <span class="field-label">URL del post (opcional)</span>
    <div class="url-row">
      <input type="url" id="liUrl" placeholder="https://www.linkedin.com/posts/...">
      <button class="url-open-btn" onclick="openPost()">Abrir →</button>
    </div>
  </div>

  <!-- Texto del post -->
  <div class="card">
    <span class="field-label">Pega el texto del post aquí</span>
    <textarea id="postText" rows="5" placeholder="Copia el contenido del post al que quieres responder..." oninput="updateCount()"></textarea>
    <div class="char-count" id="charCount">0 caracteres</div>
  </div>

  <!-- Tu contexto -->
  <div class="card">
    <span class="field-label">Tu contexto (opcional)</span>
    <textarea id="contextText" rows="2" placeholder="Ej: Soy consultor de RRHH, quiero posicionarme como experto en clima organizacional..."></textarea>
  </div>

  <!-- Tonos -->
  <div class="card">
    <span class="field-label">Tono de respuesta</span>
    <div class="tone-grid">
      <div class="tone-btn selected" data-tone="formal" onclick="toggleTone(this)">
        <div class="tone-icon">🧠</div>
        <div class="tone-name">Formal</div>
        <div class="tone-desc">Profesional y estructurado</div>
      </div>
      <div class="tone-btn" data-tone="casual" onclick="toggleTone(this)">
        <div class="tone-icon">💬</div>
        <div class="tone-name">Casual</div>
        <div class="tone-desc">Cercano y natural</div>
      </div>
      <div class="tone-btn" data-tone="empatico" onclick="toggleTone(this)">
        <div class="tone-icon">🤝</div>
        <div class="tone-name">Empático</div>
        <div class="tone-desc">Conecta con el autor</div>
      </div>
      <div class="tone-btn" data-tone="estrategico" onclick="toggleTone(this)">
        <div class="tone-icon">♟️</div>
        <div class="tone-name">Estratégico</div>
        <div class="tone-desc">Posiciona tu marca</div>
      </div>
    </div>
  </div>

  <!-- Botón generar -->
  <button class="generate-btn" id="generateBtn" onclick="generate()">
    ✦ Generar respuestas
  </button>

  <!-- Resultados -->
  <div id="results"></div>

</div>

<script>
var selectedTones = ['formal'];

function toggleTone(el) {
  var tone = el.dataset.tone;
  var idx = selectedTones.indexOf(tone);
  if (idx > -1) {
    if (selectedTones.length > 1) {
      selectedTones.splice(idx, 1);
      el.classList.remove('selected');
    }
  } else {
    selectedTones.push(tone);
    el.classList.add('selected');
  }
}

function updateCount() {
  var n = document.getElementById('postText').value.length;
  document.getElementById('charCount').textContent = n + ' caracteres';
}

function openPost() {
  var url = document.getElementById('liUrl').value.trim();
  if (url) window.open(url, '_blank');
}

async function generate() {
  var postText = document.getElementById('postText').value.trim();
  var context  = document.getElementById('contextText').value.trim();
  if (!postText) {
    showError('Por favor pega el texto del post antes de generar.');
    return;
  }

  var btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = 'Generando...';
  document.getElementById('results').innerHTML = '<div class="loading"><div class="loading-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div>Analizando el post y generando respuestas...</div></div>';

  try {
    var resp = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ postText, context, tones: selectedTones })
    });
    var data = await resp.json();
    if (data.error) { showError(data.error); return; }
    renderReplies(data.replies || []);
  } catch(e) {
    showError('Error de conexión. Verifica tu internet e intenta de nuevo.');
  }

  btn.disabled = false;
  btn.textContent = '✦ Generar respuestas';
}

function renderReplies(replies) {
  if (!replies.length) { showError('No se generaron respuestas. Intenta de nuevo.'); return; }
  var liUrl = document.getElementById('liUrl').value.trim();
  var toneIcons = { formal:'🧠', casual:'💬', empatico:'🤝', estrategico:'♟️' };
  var toneLabels = { formal:'Formal', casual:'Casual', empatico:'Empático', estrategico:'Estratégico' };

  var html = '<div class="section-title">' + replies.length + ' respuesta' + (replies.length > 1 ? 's' : '') + ' generada' + (replies.length > 1 ? 's' : '') + '</div><div class="divider"></div>';

  replies.forEach(function(r, i) {
    var escaped = (r.text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var safeText = (r.text || '').replace(/'/g, "\\'").replace(/\n/g, '\\n');
    html += '<div class="result-card" style="animation-delay:' + (i*0.07) + 's">';
    html += '<div class="result-header">';
    html += '<span class="tone-badge badge-' + r.tone + '">' + (toneIcons[r.tone]||'') + ' ' + (toneLabels[r.tone]||r.tone) + '</span>';
    html += '</div>';
    html += '<div class="result-text">' + escaped + '</div>';
    html += '<div class="result-actions">';
    html += '<button class="btn-action btn-copy" onclick="copyText(\'' + safeText + '\', this)">📋 Copiar</button>';
    if (liUrl) html += '<a href="' + liUrl + '" target="_blank" class="btn-action btn-li">Ir al post →</a>';
    html += '</div></div>';
  });

  document.getElementById('results').innerHTML = html;
}

function copyText(text, btn) {
  var decoded = text.replace(/\\n/g, '\n');
  navigator.clipboard.writeText(decoded).then(function() {
    btn.textContent = '✓ Copiado';
    btn.classList.add('copied');
    setTimeout(function() { btn.innerHTML = '📋 Copiar'; btn.classList.remove('copied'); }, 2000);
  });
}

function showError(msg) {
  document.getElementById('results').innerHTML = '<div class="error-box">⚠ ' + msg + '</div>';
  var btn = document.getElementById('generateBtn');
  btn.disabled = false;
  btn.textContent = '✦ Generar respuestas';
}
</script>
</body>
</html>
